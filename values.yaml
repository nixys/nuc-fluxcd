# -- Extra annotations applied to every rendered resource.
commonAnnotations: {}

# The defaults below are aligned with the Flux CRDs referenced by
# https://github.com/fluxcd/flux2/blob/main/manifests/crds/kustomization.yaml.
# Override them if your cluster serves another Flux API version.
apiVersions:
  # -- Default apiVersion for Alert resources.
  alert: notification.toolkit.fluxcd.io/v1beta3
  # -- Default apiVersion for ArtifactGenerator resources.
  artifactGenerator: source.extensions.fluxcd.io/v1beta1
  # -- Default apiVersion for Bucket resources.
  bucket: source.toolkit.fluxcd.io/v1
  # -- Default apiVersion for ExternalArtifact resources.
  externalArtifact: source.toolkit.fluxcd.io/v1
  # -- Default apiVersion for GitRepository resources.
  gitRepository: source.toolkit.fluxcd.io/v1
  # -- Default apiVersion for HelmChart resources.
  helmChart: source.toolkit.fluxcd.io/v1
  # -- Default apiVersion for HelmRelease resources.
  helmRelease: helm.toolkit.fluxcd.io/v2
  # -- Default apiVersion for HelmRepository resources.
  helmRepository: source.toolkit.fluxcd.io/v1
  # -- Default apiVersion for ImagePolicy resources.
  imagePolicy: image.toolkit.fluxcd.io/v1
  # -- Default apiVersion for ImageRepository resources.
  imageRepository: image.toolkit.fluxcd.io/v1
  # -- Default apiVersion for ImageUpdateAutomation resources.
  imageUpdateAutomation: image.toolkit.fluxcd.io/v1
  # -- Default apiVersion for Kustomization resources.
  kustomization: kustomize.toolkit.fluxcd.io/v1
  # -- Default apiVersion for OCIRepository resources.
  ociRepository: source.toolkit.fluxcd.io/v1
  # -- Default apiVersion for Provider resources.
  provider: notification.toolkit.fluxcd.io/v1beta3
  # -- Default apiVersion for Receiver resources.
  receiver: notification.toolkit.fluxcd.io/v1

# Each map entry supports:
