include:
  - project: $CI_INCLUDE_PATH
    ref: $CI_INCLUDE_REF
    file:
      - "/variables-subchart.gitlab-ci.yml"

  - project: $CI_INCLUDE_PATH
    ref: $CI_INCLUDE_REF
    file:
      - "/test-subchart.gitlab-ci.yml"

  - project: $CI_INCLUDE_PATH
    ref: $CI_INCLUDE_REF
    file:
      - "/publish-subchart.gitlab-ci.yml"

  - project: $CI_INCLUDE_PATH
    ref: $CI_INCLUDE_REF
    file:
      - "/sign-subchart.gitlab-ci.yml"

variables:
  KUBECONFORM_SKIP_KINDS_DEFAULT: "Alert,ArtifactGenerator,Bucket,ExternalArtifact,GitRepository,HelmChart,HelmRelease,HelmRepository,ImagePolicy,ImageRepository,ImageUpdateAutomation,Kustomization,OCIRepository,Provider,Receiver"

before_script:
  - |
    merged_skip_kinds=""
    old_ifs="$IFS"
    IFS=','
    for kind in ${KUBECONFORM_SKIP_KINDS_DEFAULT:-} ${KUBECONFORM_SKIP_KINDS:-}; do
      kind="${kind#"${kind%%[![:space:]]*}"}"
      kind="${kind%"${kind##*[![:space:]]}"}"
      [ -n "$kind" ] || continue
      case ",$merged_skip_kinds," in
        *,"$kind",*) ;;
        *) merged_skip_kinds="${merged_skip_kinds:+$merged_skip_kinds,}$kind" ;;
      esac
    done
    IFS="$old_ifs"
    export KUBECONFORM_SKIP_KINDS="$merged_skip_kinds"

stages:
  - lint
  - tests

  - validate-tag
  - package
  - publish

  - sign
  - metadata
  - verify
